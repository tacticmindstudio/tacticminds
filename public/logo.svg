<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark elegant background gradient matching the uploaded image -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </radialGradient>
    
    <!-- Metallic silver gradient for premium look -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#e2e8f0"/>
      <stop offset="70%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Glowing metallic for details -->
    <linearGradient id="metalGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="32" fill="url(#bgGrad)"/>

  <!-- Brain Logo Group -->
  <g transform="translate(0, -20)">
    <!-- LEFT SIDE: GEARS AND MACHINERY (Gears Hemisphere) -->
    <g fill="url(#metalGrad)" stroke="url(#metalGlow)" stroke-width="1.5">
      <!-- Main Upper Left Contour -->
      <path d="M246,110 C210,110 160,120 140,150 C125,170 120,200 130,225 C115,240 110,265 115,290 C120,320 145,340 170,350 C165,365 170,380 185,395 C200,410 225,415 246,410 Z" fill="none" stroke-width="4" stroke-dasharray="none"/>
      
      <!-- Center Gear 1 (Upper) -->
      <g transform="translate(200, 190)">
        <circle r="36" fill="none" stroke-width="4"/>
        <circle r="22" fill="none" stroke-dasharray="4,4" stroke-width="2"/>
        <circle r="8" fill="url(#metalGlow)"/>
        <!-- Gear teeth -->
        <path d="M -4,-42 L 4,-42 L 6,-36 L -6,-36 Z"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(30)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(60)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(90)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(120)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(150)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(180)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(210)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(240)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(270)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(300)"/>
        <path d="M -4,36 L 4,36 L 6,42 L -6,42 Z" transform="rotate(330)"/>
      </g>

      <!-- Center Gear 2 (Lower) -->
      <g transform="translate(195, 290)">
        <circle r="44" fill="none" stroke-width="5"/>
        <circle r="28" fill="none" stroke-width="2"/>
        <circle r="12" fill="url(#metalGlow)"/>
        <!-- Gear teeth -->
        <path d="M -5,-50 L 5,-50 L 7,-44 L -7,-44 Z"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(24)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(48)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(72)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(96)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(120)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(144)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(168)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(192)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(216)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(240)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(264)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(288)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(312)"/>
        <path d="M -5,44 L 5,44 L 7,50 L -7,50 Z" transform="rotate(336)"/>
      </g>

      <!-- Small Gear 3 (Far Left) -->
      <g transform="translate(145, 235)">
        <circle r="18" fill="none" stroke-width="3"/>
        <circle r="5" fill="url(#metalGlow)"/>
        <path d="M -3,-22 L 3,-22 L 4,-18 L -4,-18 Z"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(45)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(90)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(135)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(180)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(225)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(270)"/>
        <path d="M -3,18 L 3,18 L 4,22 L -4,22 Z" transform="rotate(315)"/>
      </g>

      <!-- Small Gear 4 (Top Corner) -->
      <g transform="translate(215, 135)">
        <circle r="14" fill="none" stroke-width="2.5"/>
        <circle r="4" fill="url(#metalGlow)"/>
        <path d="M -2,-17 L 2,-17 L 3,-14 L -3,-14 Z"/>
        <path d="M -2,14 L 2,14 L 3,17 L -3,17 Z" transform="rotate(60)"/>
        <path d="M -2,14 L 2,14 L 3,17 L -3,17 Z" transform="rotate(120)"/>
        <path d="M -2,14 L 2,14 L 3,17 L -3,17 Z" transform="rotate(180)"/>
        <path d="M -2,14 L 2,14 L 3,17 L -3,17 Z" transform="rotate(240)"/>
        <path d="M -2,14 L 2,14 L 3,17 L -3,17 Z" transform="rotate(300)"/>
      </g>

      <!-- Connecting rods / mechanical lines left side -->
      <path d="M 246,110 L 246,410" stroke-width="6" stroke-linecap="round"/>
      <path d="M 200,190 L 145,235" stroke-width="3"/>
      <path d="M 195,290 L 145,235" stroke-width="3"/>
      <path d="M 200,190 L 195,290" stroke-width="3.5"/>
      <path d="M 200,190 L 215,135" stroke-width="2.5"/>
      <path d="M 145,235 L 125,245" stroke-width="2"/>
    </g>

    <!-- RIGHT SIDE: NEURAL NETWORK (Nodes Hemisphere) -->
    <g stroke="url(#metalGlow)" stroke-width="3" stroke-linecap="round">
      <!-- Main Upper Right Contour -->
      <path d="M266,110 C302,110 352,120 372,150 C387,170 392,200 382,225 C397,240 402,265 397,290 C392,320 367,340 342,350 C347,365 342,380 327,395 C312,410 287,415 266,410 Z" fill="none" stroke="url(#metalGrad)" stroke-width="4" stroke-dasharray="none"/>
      
      <!-- Neural Pathway Connections (Network lines) -->
      <line x1="266" y1="135" x2="310" y2="155"/>
      <line x1="310" y1="155" x2="350" y2="135"/>
      <line x1="310" y1="155" x2="285" y2="205"/>
      <line x1="285" y1="205" x2="335" y2="225"/>
      <line x1="350" y1="135" x2="365" y2="195"/>
      <line x1="365" y1="195" x2="335" y2="225"/>
      <line x1="335" y1="225" x2="315" y2="280"/>
      <line x1="315" y1="280" x2="270" y2="335"/>
      <line x1="315" y1="280" x2="365" y2="310"/>
      <line x1="365" y1="195" x2="390" y2="250"/>
      <line x1="390" y1="250" x2="365" y2="310"/>
      <line x1="365" y1="310" x2="335" y2="375"/>
      <line x1="270" y1="335" x2="335" y2="375"/>
      
      <!-- Center Split Border Rod -->
      <path d="M 266,110 L 266,410" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Neural Nodes (Circles overlay on connections) -->
    <g fill="url(#metalGrad)" stroke="url(#metalGlow)" stroke-width="1.5">
      <circle cx="266" cy="135" r="7"/>
      <circle cx="310" cy="155" r="10"/>
      <circle cx="350" cy="135" r="8"/>
      <circle cx="285" cy="205" r="9"/>
      <circle cx="365" cy="195" r="11"/>
      <circle cx="335" cy="225" r="12"/>
      <circle cx="390" cy="250" r="8"/>
      <circle cx="315" cy="280" r="11"/>
      <circle cx="365" cy="310" r="10"/>
      <circle cx="270" cy="335" r="12"/>
      <circle cx="335" cy="375" r="9"/>
    </g>
  </g>

  <!-- TYPOGRAPHY / LOGO TEXT -->
  <text x="256" y="440" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="34" font-weight="800" fill="url(#metalGrad)" text-anchor="middle" letter-spacing="1">Tactic Minds</text>
  <text x="256" y="480" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="url(#metalGlow)" text-anchor="middle" letter-spacing="10">STUDIO</text>
</svg>
